<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A1614" />
    <!-- Kök fallback: botlar <head>'i okumadan /favicon.ico ister; Google SERP
         ikonu da ana sayfanın favicon'undan alınır. sizes="any" → .ico tüm boyutları kapsar. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- PNG favicon varyantları — Google 48px'in katını tercih eder (192 = 48×4) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/zara-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/zara-icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/zara-icon-512.png" />
    <!-- iOS Safari ana ekran ikonu (PNG) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/zara-icon-180.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/zara-icon-180.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ZARA Atelye — Vardiya Planlama & Mağaza Eğitim Aracı</title>
    <meta name="description" content="Mağaza ekipleri için vardiya planlama, yetkinlik takibi ve eğitim modülleri tek atelyede. ZARA Atelye · zaratraining ile çizelgeni dakikalar içinde oluştur." />
    <meta name="keywords" content="zara, zaratraining, zara training, zara atelye, mağaza eğitim, vardiya planlama, shift organizer, store training, zara españa, zara türkiye" />
    <meta name="author" content="ZARA Atelye" />
    <link rel="canonical" href="https://zaratraining.online/" />

    <!-- Open Graph (Facebook, WhatsApp, Slack vb.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZARA · Atelye" />
    <meta property="og:title" content="ZARA · Atelye — Mağaza Eğitim & Operasyon Araçları" />
    <meta property="og:description" content="Bir koleksiyondaki parçalar gibi: her biri farklı, hep birlikte ZARA. Mağaza eğitim ve operasyon araçları." />
    <meta property="og:url" content="https://zaratraining.online/" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:image" content="https://zaratraining.online/zara-icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="ZARA Atelye logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZARA · Atelye" />
    <meta name="twitter:description" content="Mağaza eğitim ve operasyon araçlarının atelyesi." />
    <meta name="twitter:image" content="https://zaratraining.online/zara-icon-512.png" />

    <!-- JSON-LD Structured Data: search engine'ler için zengin metadata -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ZARA · Atelye",
        "alternateName": ["ZARA Training", "ZARA Atelier"],
        "url": "https://zaratraining.online/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "ZARA mağaza eğitim ve operasyon araçlarının atelyesi. Vardiya planlama, yetkinlik takibi, eğitim modülleri.",
        "inLanguage": ["tr-TR", "es-ES"],
        "image": "https://zaratraining.online/zara-icon-512.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "publisher": {
          "@type": "Organization",
          "name": "ZARA Atelye",
          "url": "https://zaratraining.online/"
        }
      }
    </script>
    <!-- WebSite: site adı + marka varyantları (Google SERP'te "ZARA Atelye" site adı) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ZARA Atelye",
        "alternateName": ["zaratraining", "ZARA Training", "ZARA Atelier"],
        "url": "https://zaratraining.online/",
        "inLanguage": ["tr-TR", "es-ES"]
      }
    </script>
    <!-- Organization: logo + marka kimliği (knowledge graph eşleştirmesi) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ZARA Atelye",
        "alternateName": "zaratraining",
        "url": "https://zaratraining.online/",
        "logo": "https://zaratraining.online/zara-icon-512.png"
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400;1,6..72,500&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
